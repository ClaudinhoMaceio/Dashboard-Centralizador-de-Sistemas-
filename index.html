<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Claudinho Maceió | Hub Central Dinâmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ícones Modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #0a0b10;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 242, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 100, 255, 0.08) 0px, transparent 50%);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-font { font-family: 'Rajdhani', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.07);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .neon-glow {
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7);
        }

        .grid-bg {
            background-size: 60px 60px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        }

        .icon-container {
            transition: all 0.4s ease;
        }

        .glass-card:hover .icon-container {
            transform: rotate(12deg) scale(1.1);
            background: var(--primary);
            color: black;
        }

        .card-reveal {
            animation: reveal 0.6s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Shimmer Loading Effect */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="grid-bg relative pb-20">

    <header class="max-w-7xl mx-auto pt-16 px-6 mb-16 text-center">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 border border-cyan-500/30 rounded-full bg-cyan-500/10 text-cyan-400 text-xs font-bold tracking-[0.2em] mb-6 uppercase animate-pulse">
            <i data-lucide="github" class="w-4 h-4"></i>
            Sincronizado com GitHub
        </div>
        <h1 class="header-font text-6xl md:text-7xl font-bold tracking-tighter text-white mb-6">
            NEXUS <span class="text-cyan-400 neon-glow italic">LIVE</span>
        </h1>
        <p class="text-gray-400 max-w-2xl mx-auto text-base md:text-lg font-light leading-relaxed">
            Seu ecossistema de sistemas atualizado em tempo real. Novos projetos aparecem aqui automaticamente.
        </p>
    </header>

    <div class="max-w-xl mx-auto px-6 mb-16">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
            <div class="relative">
                <input type="text" id="searchInput" 
                    placeholder="Buscar nos repositórios ativos..." 
                    class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-14 focus:outline-none focus:border-cyan-500/50 transition-all text-sm backdrop-blur-md">
                <i data-lucide="search" class="absolute left-5 top-4 h-6 w-6 text-cyan-500/70"></i>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6">
        <div id="systemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading States -->
            <div class="skeleton h-24 rounded-3xl opacity-20"></div>
            <div class="skeleton h-24 rounded-3xl opacity-20"></div>
            <div class="skeleton h-24 rounded-3xl opacity-20"></div>
            <div class="skeleton h-24 rounded-3xl opacity-20"></div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-black/60 backdrop-blur-xl border-t border-white/10 py-4 text-center z-50">
        <div class="flex items-center justify-center gap-4">
            <div class="flex items-center gap-2">
                <span id="syncStatus" class="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></span>
                <span id="statusLabel" class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Sincronizando...</span>
            </div>
            <div class="h-4 w-[1px] bg-white/10"></div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-medium">
                USUÁRIO: CLAUDINHOMACEIO
            </p>
        </div>
    </footer>

    <script>
        const USERNAME = "ClaudinhoMaceio";
        const grid = document.getElementById('systemsGrid');
        const searchInput = document.getElementById('searchInput');
        const statusLabel = document.getElementById('statusLabel');
        const syncStatus = document.getElementById('syncStatus');

        let allSystems = [];

        const iconMap = {
            'MK': 'layers', 'CORE': 'cpu', 'IA': 'bot', 'CONTROLE': 'activity',
            'AUDIOVISUAL': 'video', 'GEST-O': 'clipboard-list', 'OBRAS': 'hard-hat',
            'SABESP': 'droplets', 'CHECKLIST': 'check-square', 'DASHBOARD': 'layout-dashboard',
            'FOTOS': 'camera', 'CONTRATO': 'file-text', 'DEFAULT': 'external-link'
        };

        function getIcon(name) {
            const upperName = name.toUpperCase();
            for (const [key, icon] of Object.entries(iconMap)) {
                if (upperName.includes(key)) return icon;
            }
            return iconMap.DEFAULT;
        }

        async function fetchGitHubRepos() {
            try {
                // Busca todos os repositórios públicos ordenados por criação
                const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=created&per_page=100`);
                if (!response.ok) throw new Error('Erro ao acessar API');
                
                const data = await response.json();
                
                // Filtra apenas os que têm Pages ou você pode remover o filtro para mostrar todos
                // Por padrão, deixarei todos os públicos, mas focando no link do Pages
                allSystems = data.map(repo => ({
                    name: repo.name,
                    fullName: repo.full_name,
                    url: repo.has_pages ? `https://${USERNAME}.github.io/${repo.name}/` : repo.html_url,
                    description: repo.description || "Sistema operacional",
                    isPages: repo.has_pages
                }));

                updateStatus(true);
                renderSystems();
            } catch (error) {
                console.error(error);
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400">Erro ao carregar repositórios. Verifique sua conexão.</div>`;
                updateStatus(false);
            }
        }

        function updateStatus(success) {
            syncStatus.classList.remove('bg-yellow-500', 'animate-ping');
            if (success) {
                syncStatus.classList.add('bg-green-500');
                statusLabel.innerText = "GitHub Conectado";
            } else {
                syncStatus.classList.add('bg-red-500');
                statusLabel.innerText = "Erro na Conexão";
            }
        }

        function renderSystems(filter = "") {
            grid.innerHTML = "";
            const filtered = allSystems.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));

            filtered.forEach((sys, index) => {
                const card = document.createElement('a');
                card.href = sys.url;
                card.target = "_blank";
                card.className = "glass-card p-6 rounded-3xl flex items-center gap-5 group cursor-pointer card-reveal";
                card.style.animationDelay = `${index * 0.03}s`;
                
                let displayName = sys.name.replace(/-/g, ' ').replace(/_/g, ' ');
                const iconName = getIcon(sys.name);

                card.innerHTML = `
                    <div class="icon-container flex-shrink-0 w-14 h-14 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 group-hover:shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                        <i data-lucide="${iconName}" class="w-7 h-7"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="flex items-center gap-2">
                             <h3 class="header-font font-bold text-white truncate text-base uppercase tracking-tight group-hover:text-cyan-400 transition-colors">${displayName}</h3>
                             ${sys.isPages ? '<span class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_5px_#00f2ff]"></span>' : ''}
                        </div>
                        <p class="text-xs text-gray-500 font-mono opacity-60">/${sys.name.toLowerCase()}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();

            if(filtered.length === 0 && allSystems.length > 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 italic">Nenhum projeto encontrado.</div>`;
            }
        }

        searchInput.addEventListener('input', (e) => renderSystems(e.target.value));
        
        // Iniciar busca automática
        fetchGitHubRepos();
    </script>
</body>
</html>
