<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio CSMM | Nexus Operacional</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0b10">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlBvcnRmw7psaW8gQ1NNTSIsCiAgInNob3J0X25hbWUiOiAiQ1NNTSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGEwYjEwIiwKICAidGhlbWVfY29sb3IiOiAiIzAwZjJmZiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzExNDkvMTE0OTM0OS5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Modo Escuro (Padrão) */
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --accent: #7000ff;
            --bg-dark: #050608;
            --card-bg: rgba(13, 17, 23, 0.7);
            --text-main: #e2e8f0;
            --text-muted: rgba(255, 255, 255, 0.5);
            --grid-color: rgba(255, 255, 255, 0.02);
            --border-color: rgba(0, 242, 255, 0.1);
        }

        :root.light {
            /* Modo Claro (Corporativo Clean) */
            --primary: #008a94;
            --primary-glow: rgba(0, 138, 148, 0.3);
            --accent: #5a00cc;
            --bg-dark: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1a1f26;
            --text-muted: rgba(0, 0, 0, 0.5);
            --grid-color: rgba(0, 0, 0, 0.03);
            --border-color: rgba(0, 138, 148, 0.2);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
            transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, var(--primary-glow) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }

        /* Grade de Fundo Animada */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: -1;
            transform: perspective(1000px) rotateX(60deg) translateY(-100px);
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* Efeito de Scanline */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, var(--grid-color) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Card Futurista */
        .system-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .system-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .system-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
            transform: translateY(-5px) scale(1.02);
        }

        .system-card:hover::before {
            left: 100%;
        }

        .system-card .corner {
            position: absolute;
            width: 10px; height: 10px;
            border-color: var(--primary);
            opacity: 0;
            transition: 0.3s;
        }

        .system-card:hover .corner { opacity: 1; }

        .corner-tl { top: 5px; left: 5px; border-top: 2px solid; border-left: 2px solid; }
        .corner-br { bottom: 5px; right: 5px; border-bottom: 2px solid; border-right: 2px solid; }

        /* Texto Neon */
        .neon-text {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Animações de Entrada */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Pulso de Status */
        .status-pulse {
            position: relative;
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }
        .status-pulse::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Botão de Alternância de Tema */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1001;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>
<body class="pb-24">
    <div class="bg-grid"></div>
    <div class="scanline"></div>

    <button id="themeToggle" class="theme-toggle group" title="Alternar Modo Visual">
        <i data-lucide="sun" class="w-5 h-5 text-cyan-400 hidden group-[.is-light]:block"></i>
        <i data-lucide="moon" class="w-5 h-5 text-cyan-400 block group-[.is-light]:hidden"></i>
    </button>

    <!-- Cabeçalho Futurista -->
    <header class="relative pt-12 pb-20 px-6 overflow-hidden">
        <div class="max-w-7xl mx-auto relative z-10 text-center">
            <div class="inline-flex items-center gap-3 px-6 py-2 border border-cyan-500/20 rounded-full bg-cyan-950/20 backdrop-blur-md mb-8 animate-fadeInUp">
                <div class="status-pulse"></div>
                <span class="font-orbitron text-[10px] tracking-[0.4em] text-cyan-400 uppercase">Sincronização em Tempo Real</span>
            </div>
            
            <h1 class="font-orbitron text-5xl md:text-8xl font-bold tracking-tighter mb-4">
                PORTFÓLIO <span class="neon-text">CSMM</span>
            </h1>
            
            <p class="font-rajdhani text-lg md:text-2xl opacity-70 tracking-[0.2em] font-light max-w-3xl mx-auto uppercase">
                Hub de Sistemas & Arquitetura de Dados
            </p>
        </div>
    </header>

    <!-- Filtros e Busca -->
    <section class="max-w-4xl mx-auto px-6 mb-16 animate-fadeInUp" style="animation-delay: 0.2s;">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-600 to-purple-600 rounded-2xl blur-md opacity-20 group-hover:opacity-50 transition duration-500"></div>
            <div class="relative bg-black/10 dark:bg-black/60 border border-white/10 rounded-2xl flex items-center p-2 backdrop-blur-xl shadow-xl">
                <div class="pl-5 text-cyan-500">
                    <i data-lucide="search" class="w-6 h-6"></i>
                </div>
                <input type="text" id="searchInput" 
                    placeholder="IDENTIFICAR SISTEMA ATIVO..." 
                    class="w-full bg-transparent border-none py-4 px-4 focus:outline-none font-rajdhani tracking-widest placeholder:text-cyan-900/40">
                <div class="hidden md:flex gap-2 pr-4">
                    <span class="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded text-[10px] text-cyan-500 font-bold uppercase">Escaneando GitHub...</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Grade de Sistemas -->
    <main class="max-w-7xl mx-auto px-6">
        <div id="systemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Skeletons Dinâmicos -->
            <div class="h-40 bg-white/5 rounded-3xl animate-pulse"></div>
            <div class="h-40 bg-white/5 rounded-3xl animate-pulse"></div>
            <div class="h-40 bg-white/5 rounded-3xl animate-pulse"></div>
            <div class="h-40 bg-white/5 rounded-3xl animate-pulse"></div>
        </div>
    </main>

    <!-- Rodapé Corporativo -->
    <footer class="fixed bottom-0 left-0 w-full border-t border-cyan-500/10 bg-black/20 dark:bg-black/80 backdrop-blur-2xl z-[1000]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[9px] opacity-40 uppercase font-bold tracking-tighter">Status de Rede</span>
                    <div class="flex items-center gap-2">
                        <div id="syncPulse" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
                        <span id="statusLabel" class="text-[10px] font-orbitron tracking-widest uppercase">Conectado</span>
                    </div>
                </div>
                <div class="h-8 w-[1px] bg-cyan-500/10"></div>
                <div class="flex flex-col">
                    <span class="text-[9px] opacity-40 uppercase font-bold tracking-tighter">Sincronização</span>
                    <span id="themeIndicator" class="text-[10px] font-orbitron tracking-widest uppercase">Auto-Update ON</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <p id="accountLabel" class="text-[10px] opacity-30 font-orbitron tracking-[0.3em] uppercase">
                    © 2024 PORTFÓLIO CSMM | NEXUS v5.2
                </p>
            </div>
        </div>
    </footer>

    <script>
        // Configurações de Contas
        const ACCOUNTS = ["ClaudinhoMaceio", "claudinho-maceio"]; 
        const grid = document.getElementById('systemsGrid');
        const searchInput = document.getElementById('searchInput');
        const statusLabel = document.getElementById('statusLabel');
        const syncPulse = document.getElementById('syncPulse');
        const themeToggle = document.getElementById('themeToggle');
        const themeIndicator = document.getElementById('themeIndicator');

        let allSystems = [];

        // Lógica de Modo Escuro / Claro Automático
        function setTheme(isLight) {
            if (isLight) {
                document.documentElement.classList.add('light');
                themeToggle.classList.add('is-light');
            } else {
                document.documentElement.classList.remove('light');
                themeToggle.classList.remove('is-light');
            }
        }

        const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)');
        setTheme(systemPrefersLight.matches);
        systemPrefersLight.addEventListener('change', e => setTheme(e.matches));

        themeToggle.addEventListener('click', () => {
            const isNowLight = !document.documentElement.classList.contains('light');
            setTheme(isNowLight);
        });

        // Mapeamento de Ícones Inteligente
        const iconMap = {
            'MK': 'layers', 'CORE': 'cpu', 'IA': 'bot', 'CONTROLE': 'activity',
            'AUDIOVISUAL': 'video', 'OBRAS': 'hard-hat', 'SABESP': 'droplet', 
            'CHECKLIST': 'check-square', 'DASHBOARD': 'layout-dashboard',
            'ESTOQUE': 'package', 'FOTOS': 'camera', 'CONTRATO': 'file-signature',
            'DASCO': 'briefcase', 'BOTA': 'truck', 'MÉDICO': 'stethoscope',
            'M-D': 'stethoscope', 'PAINEL': 'layout', 'RELATÓRIO': 'file-text',
            'CHUVA': 'cloud-rain', 'VEÍCULO': 'car', 'DEFAULT': 'zap'
        };

        function getIcon(name) {
            const upperName = name.toUpperCase();
            for (const [key, icon] of Object.entries(iconMap)) {
                if (upperName.includes(key)) return icon;
            }
            return iconMap.DEFAULT;
        }

        // FUNÇÃO PRINCIPAL: Busca e Sincronização
        async function fetchAllRepos() {
            try {
                // Inicia o pulso de carregamento
                syncPulse.className = "w-2 h-2 bg-yellow-500 rounded-full animate-pulse";
                statusLabel.innerText = "Consultando Nuvem...";

                const requests = ACCOUNTS.map(user => 
                    fetch(`https://api.github.com/users/${user}/repos?sort=pushed&per_page=100`)
                    .then(res => res.ok ? res.json() : [])
                );

                const results = await Promise.all(requests);
                let combined = [];

                results.forEach((repos, index) => {
                    const owner = ACCOUNTS[index];
                    repos.forEach(repo => {
                        let displayName = repo.name
                            .replace(/-/g, ' ')
                            .replace(/_/g, ' ')
                            .replace(/\b\w/g, l => l.toUpperCase());

                        combined.push({
                            id: repo.id,
                            name: repo.name,
                            displayName: displayName,
                            owner: owner,
                            url: repo.has_pages ? `https://${owner}.github.io/${repo.name}/` : repo.html_url,
                            isPages: repo.has_pages,
                            updatedAt: new Date(repo.pushed_at || repo.updated_at),
                            language: repo.language || 'DATA'
                        });
                    });
                });

                // Se um repositório for apagado no GitHub, ele não virá na lista 'combined'
                // e a 'allSystems' será substituída pela nova lista filtrada automaticamente.
                allSystems = combined.sort((a, b) => b.updatedAt - a.updatedAt);
                
                renderSystems(searchInput.value);
                updateUIStatus(true);
            } catch (error) {
                console.error("Erro na Sincronização:", error);
                updateUIStatus(false);
            }
        }

        function updateUIStatus(online) {
            if (online) {
                syncPulse.className = "w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]";
                statusLabel.innerText = "Sincronizado";
            } else {
                syncPulse.className = "w-2 h-2 bg-red-600 rounded-full shadow-[0_0_10px_#dc2626]";
                statusLabel.innerText = "Link Interrompido";
            }
        }

        function renderSystems(filter = "") {
            // Limpa o grid completamente antes de redesenhar
            // Isso garante que itens deletados sumam da tela
            grid.innerHTML = "";
            
            const filtered = allSystems.filter(s => 
                s.name.toLowerCase().includes(filter.toLowerCase()) || 
                s.displayName.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0 && allSystems.length > 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40 font-rajdhani tracking-widest uppercase">Nenhum sistema identificado com este parâmetro.</div>`;
                return;
            }

            filtered.forEach((sys, index) => {
                const card = document.createElement('a');
                card.href = sys.url;
                card.target = "_blank";
                card.className = "system-card p-6 rounded-2xl group animate-fadeInUp relative";
                card.style.animationDelay = `${index * 0.05}s`;
                
                const iconName = getIcon(sys.name);
                const timeAgo = Math.floor((new Date() - sys.updatedAt) / (1000 * 60 * 60 * 24));
                const timeLabel = timeAgo === 0 ? 'Recente' : `${timeAgo}d`;

                card.innerHTML = `
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-br"></div>
                    
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 rounded-xl bg-cyan-500/5 border border-cyan-500/20 flex items-center justify-center text-cyan-500 group-hover:bg-cyan-500 group-hover:text-black transition-all duration-500">
                            <i data-lucide="${iconName}" class="w-6 h-6"></i>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-[8px] font-orbitron opacity-40 uppercase tracking-widest">Atividade</span>
                            <span class="text-[10px] font-bold text-cyan-500">${timeLabel}</span>
                        </div>
                    </div>

                    <div class="relative">
                        <h3 class="font-orbitron font-bold text-xs tracking-wider mb-2 group-hover:text-cyan-500 transition-colors uppercase truncate">
                            ${sys.displayName}
                        </h3>
                        <div class="flex items-center justify-between">
                            <span class="text-[9px] font-rajdhani opacity-50 tracking-[0.2em]">@${sys.owner.toUpperCase()}</span>
                            <div class="flex items-center gap-1.5">
                                <span class="text-[8px] px-1.5 py-0.5 bg-cyan-500/10 rounded text-cyan-600 font-bold uppercase">${sys.language}</span>
                                ${sys.isPages ? '<div class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_8px_#00f2ff]"></div>' : ''}
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        // PWA - Registrar Service Worker para permitir instalação
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('fetch', function(event) {});`;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
            });
        }

        searchInput.addEventListener('input', (e) => renderSystems(e.target.value));
        
        // Executa busca inicial
        fetchAllRepos();
        
        // Sincronização automática a cada 5 minutos (300.000 ms)
        setInterval(fetchAllRepos, 300000);
    </script>
</body>
</html>
